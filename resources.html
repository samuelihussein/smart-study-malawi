<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library - Northern Scholars Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="bg-emerald-700 text-white p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">NSC <span class="font-light">Connect</span></h1>
            <div class="space-x-4">
                <a href="index.html" class="hover:text-emerald-200">Home</a>
                <a href="upload.html" class="bg-white text-emerald-700 px-4 py-2 rounded-lg text-sm font-bold">Upload New</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-10 px-6">
        <header class="text-center mb-10">
            <h2 class="text-3xl font-bold mb-2">Digital Library</h2>
            <p class="text-slate-600">Download JCE & MSCE past papers shared by the community.</p>
        </header>

        <div class="flex flex-col md:flex-row gap-4 mb-8 max-w-4xl mx-auto">
            <input type="text" id="searchBox" placeholder="Search subject..." class="flex-1 p-3 border rounded-lg outline-none focus:ring-2 focus:ring-emerald-500">
            <select id="levelFilter" class="p-3 border rounded-lg outline-none">
                <option value="all">All Levels</option>
                <option value="MSCE">MSCE</option>
                <option value="JCE">JCE</option>
            </select>
            <button onclick="loadPapers()" class="bg-emerald-600 text-white px-6 py-3 rounded-lg hover:bg-emerald-700">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
        </div>

        <div id="papersGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20">
                <i class="fas fa-spinner fa-spin text-4xl text-emerald-600 mb-4"></i>
                <p>Loading library...</p>
            </div>
        </div>
    </main>

    <script>
        // REPLACE WITH YOUR ACTUAL KEYS
        const SB_URL = 'https://famvbzvtfjlnzvucltaw.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhbXZienZ0Zmpsbnp2dWNsdGF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NzU0MjcsImV4cCI6MjA5MDM1MTQyN30.uV2r01AfdsfBD9Lzh8FCWlN08ae74hf7XZCBSVApuJUeyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhbXZienZ0Zmpsbnp2dWNsdGF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NzU0MjcsImV4cCI6MjA5MDM1MTQyN30.uV2r01AfdsfBD9Lzh8FCWlN08ae74hf7XZCBSVApuJU';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function loadPapers() {
            const grid = document.getElementById('papersGrid');
            const search = document.getElementById('searchBox').value.toLowerCase();
            const level = document.getElementById('levelFilter').value;

            try {
                let query = _supabase.from('papers').select('*').order('created_at', { ascending: false });
                
                // Filter by level if not "all"
                if (level !== 'all') {
                    query = query.eq('level', level);
                }

                const { data: papers, error } = await query;

                if (error) throw error;

                grid.innerHTML = ''; // Clear loading state

                if (papers.length === 0) {
                    grid.innerHTML = '<div class="col-span-full text-center text-slate-500">No papers found.</div>';
                    return;
                }

                papers.forEach(paper => {
                    // Search filter logic
                    if (search && !paper.subject.toLowerCase().includes(search)) return;

                    const card = `
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 hover:shadow-md transition-all">
                            <div class="flex justify-between items-center mb-3">
                                <span class="bg-emerald-100 text-emerald-800 text-xs font-bold px-2 py-1 rounded">${paper.level}</span>
                                <span class="text-slate-400 text-xs font-medium">${paper.year || 'N/A'}</span>
                            </div>
                            <h3 class="text-lg font-bold text-slate-800 mb-1">${paper.subject}</h3>
                            <p class="text-xs text-slate-500 mb-4 italic">Shared by ${paper.contributor_name}</p>
                            <a href="${paper.file_url}" target="_blank" download class="block w-full bg-slate-800 text-white text-center py-2 rounded-lg hover:bg-black transition-colors font-semibold">
                                <i class="fas fa-file-download mr-2"></i> Download
                            </a>
                        </div>
                    `;
                    grid.innerHTML += card;
                });

            } catch (err) {
                grid.innerHTML = `<div class="col-span-full text-center text-red-500">Error: ${err.message}</div>`;
            }
        }

        // Search on typing
        document.getElementById('searchBox').addEventListener('input', loadPapers);
        document.getElementById('levelFilter').addEventListener('change', loadPapers);

        // Initial Load
        loadPapers();
    </script>
</body>
</html>
