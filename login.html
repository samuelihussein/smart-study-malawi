<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Northern Scholars Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Dark Mode Styles */
        body.dark-mode {
            background-color: #0f172a; /* Dark Slate */
            color: #f1f5f9;
        }
        .dark-mode .bg-white {
            background-color: #1e293b !important; /* Lighter Dark Slate */
            color: #f1f5f9 !important;
        }
        .dark-mode .text-slate-800, .dark-mode .text-slate-700 {
            color: #f1f5f9 !important;
        }
        .dark-mode .border {
            border-color: #334155 !important;
        }
        .dark-mode .bg-slate-50 {
            background-color: #0f172a !important;
        }
    </style>
</head>
<body class="bg-emerald-700 min-h-screen flex items-center justify-center p-6">

    <button onclick="toggleDarkMode()" class="fixed top-4 right-4 text-xl px-2 focus:outline-none" id="dark-mode-toggle">
        <i class="fas fa-moon"></i>
    </button>

    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden">
        <div class="bg-slate-50 p-8 text-center border-b border-slate-100">
            <div class="bg-emerald-600 text-white w-12 h-12 rounded-xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i class="fas fa-lock"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800">Welcome Back</h2>
            <p class="text-slate-400 text-sm mt-1">Login to access your saved tasks</p>
        </div>

        <form action="dashboard.html" class="p-8 space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">Email or Phone</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-3.5 text-slate-300"></i>
                    <input type="text" placeholder="yourname@email.com" 
                        class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 transition">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">Password</label>
                <div class="relative">
                    <i class="fas fa-key absolute left-4 top-3.5 text-slate-300"></i>
                    <input type="password" placeholder="••••••••" 
                        class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 transition">
                </div>
            </div>

            <div class="flex items-center justify-between text-xs">
                <label class="flex items-center gap-2 text-slate-500 cursor-pointer">
                    <input type="checkbox" class="rounded border-slate-300 text-emerald-600 focus:ring-emerald-500">
                    Remember me
                </label>
                <a href="#" class="text-emerald-600 font-bold hover:underline">Forgot Password?</a>
            </div>

            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-emerald-100 transition-all transform active:scale-95">
                Login to My Account
            </button>
        </form>

        <div class="bg-slate-50 p-6 text-center border-t border-slate-100">
            <p class="text-sm text-slate-500">
                New to the community? <a href="register.html" class="text-emerald-600 font-bold hover:underline">Create Account</a>
            </p>
        </div>
    </div>

    <footer class="py-10 text-center text-slate-400 text-xs">
        <p>&copy; 2026 MSCE Digital Library</p>
        <button class="mt-4 px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition-colors" onclick="meetDevelopers()">Meet the Developers</button>
    </footer>

    <script>
        function toggleDarkMode() {
            const body = document.body;
            const icon = document.querySelector('#dark-mode-toggle i');
            
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
                localStorage.setItem('theme', 'dark');
            } else {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
                localStorage.setItem('theme', 'light');
            }
        }

        window.onload = function() {
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                // Use a check to make sure the toggle button exists on this specific page
                const toggleBtn = document.querySelector('#dark-mode-toggle i');
                if(toggleBtn) {
                    toggleBtn.classList.replace('fa-moon', 'fa-sun');
                }
            }
        }

        function meetDevelopers() {
            window.location.href = 'developer.html';
        }
    </script>

</body>
</html>
