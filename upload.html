<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Paper - Northern Scholars Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        body.dark-mode { background-color: #0f172a; color: #f1f5f9; }
        .dark-mode .bg-white { background-color: #1e293b !important; color: #f1f5f9 !important; }
        .dark-mode .text-slate-800, .dark-mode .text-slate-700 { color: #f1f5f9 !important; }
        .dark-mode .border { border-color: #334155 !important; }
        .dark-mode input, .dark-mode select { background-color: #1e293b !important; color: #f1f5f9 !important; border-color: #334155 !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="bg-emerald-700 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight">NSC <span class="font-light text-emerald-200">Connect</span></h1>
            <div class="flex gap-4 items-center">
                <a href="index.html" class="text-sm font-medium hover:text-emerald-200">Back to Home</a>
                <button onclick="toggleDarkMode()" class="text-xl px-2 focus:outline-none" id="dark-mode-toggle">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-12 px-6 max-w-2xl">
        <div class="bg-white rounded-2xl shadow-lg p-8 border border-slate-100">
            <div class="text-center mb-8">
                <div class="text-emerald-600 text-4xl mb-4"><i class="fas fa-cloud-upload-alt"></i></div>
                <h1 class="text-3xl font-bold text-slate-800 mb-2">📤 Contribute a Paper</h1>
                <p class="text-slate-600 text-sm">Fill in the details below to add to our digital library.</p>
            </div>

            <form id="paperForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Student/Teacher Name</label>
                    <input type="text" id="contributor_name" required placeholder="Your name" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Subject</label>
                    <input type="text" id="subject" required placeholder="e.g. Mathematics" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Level</label>
                        <select id="level" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
                            <option value="MSCE">MSCE</option>
                            <option value="JCE">JCE</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Year</label>
                        <input type="number" id="year" placeholder="2025" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Select File (PDF/Word)</label>
                    <input type="file" id="file_upload" accept=".pdf,.doc,.docx" required class="w-full px-4 py-3 border border-slate-300 rounded-lg file:mr-4 file:py-1 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-emerald-50 file:text-emerald-700">
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-lg transition-all shadow-lg transform active:scale-95">
                    <i class="fas fa-paper-plane mr-2"></i> Submit Paper
                </button>
            </form>
        </div>
    </main>

    <script>
        // --- 1. CONFIGURATION (REPLACE WITH YOUR KEYS) ---
        const SB_URL = 'https://famvbzvtfjlnzvucltaw.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhbXZienZ0Zmpsbnp2dWNsdGF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NzU0MjcsImV4cCI6MjA5MDM1MTQyN30.uV2r01AfdsfBD9Lzh8FCWlN08ae74hf7XZCBSVApuJU';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        // --- 2. UPLOAD LOGIC ---
        const form = document.getElementById('paperForm');
        const btn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Uploading...';
            btn.disabled = true;

            const file = document.getElementById('file_upload').files[0];
            const name = document.getElementById('contributor_name').value;
            const subject = document.getElementById('subject').value;
            const level = document.getElementById('level').value;
            const year = document.getElementById('year').value || 'Unknown';

            if (!file) {
                alert('Please select a file to upload.');
                btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i> Submit Paper';
                btn.disabled = false;
                return;
            }

            const acceptedTypes = [
                'application/pdf',
                'application/msword',
                'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
            ];

            if (!acceptedTypes.includes(file.type)) {
                alert('Upload failed: mime type ' + file.type + ' is not supported. Please select PDF or Word document.');
                btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i> Submit Paper';
                btn.disabled = false;
                return;
            }

            try {
                // A. Upload to Storage (Bucket name must be 'past-papers')
                const fileName = `${Date.now()}_${file.name}`;
                const { data: uploadData, error: uploadError } = await _supabase.storage
                    .from('past-papers')
                    .upload(fileName, file, {
                        cacheControl: '3600',
                        upsert: false,
                        contentType: file.type
                    });

                if (uploadError) throw uploadError;

                // B. Get Link
                const { data: urlData } = _supabase.storage.from('past-papers').getPublicUrl(fileName);

                // C. Save to Table (Table name must be 'papers')
                const { error: dbError } = await _supabase.from('papers').insert([{ 
                    contributor_name: name, 
                    subject: subject, 
                    level: level, 
                    year: year,
                    file_url: urlData.publicUrl 
                }]);

                if (dbError) throw dbError;

                alert("Zikomo! Paper uploaded successfully.");
                window.location.href = 'index.html';

            } catch (err) {
                alert('Upload failed: ' + err.message);
                btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i> Submit Paper';
                btn.disabled = false;
            }
        });

        // Dark Mode Logic
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('dark-mode-toggle').innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
        }
        if (localStorage.getItem('darkMode') === 'enabled') {
            document.body.classList.add('dark-mode');
            document.getElementById('dark-mode-toggle').innerHTML = '<i class="fas fa-sun"></i>';
        }
    </script>
</body>
</html>
